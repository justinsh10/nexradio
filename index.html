<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEX Radio</title>
    
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    
    <style>
        /* Estilos para el fondo y centrado */
        body { 
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* Usamos tu imagen de fondo "nexradio2.jpg" */
            background-image: url('nexradio2.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: white;
            font-family: Arial, sans-serif;
        }
        /* Contenedor semitransparente para que resalte el texto */
        .container { 
            text-align: center;
            width: 90%;
            max-width: 500px;
            background-color: rgba(0, 0, 0, 0.7); /* Fondo negro semitransparente */
            padding: 20px;
            border-radius: 15px;
        }
        .logo { 
            width: 200px; /* Tamaño ajustado del logo */
            height: auto; 
            margin-bottom: 15px;
        }
        h2, h3, p {
            margin: 5px 0;
        }
        audio {
            width: 100%;
            margin-top: 15px;
            /* Filtro para que el reproductor se vea oscuro y encaje */
            filter: invert(90%) hue-rotate(180deg); 
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="NEX Radio" class="logo">

        <h2>EN VIVO</h2>
        <h3>NEX Radio</h3>
        <p><em>La emisora que SINTONIZA tus SENTIDOS</em></p>

        <audio controls autoplay>
            <source src="https://uni-solo-bacon-commodities.trycloudflare.com/live" type="audio/mpeg">
        </audio>

        <div style="margin-top: 15px; font-size: 24px;">🇻🇪</div>
    </div>

</body>
</html>
