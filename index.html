<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEX Radio | En Vivo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* Fondo actualizado */
            background-image: url('nexradio2.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            font-family: Arial, sans-serif;
            color: white;
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.6); 
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        img.logo {
            max-width: 250px;
            margin-bottom: 20px;
        }

        audio {
            width: 100%;
            max-width: 350px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="NEX Radio" class="logo">
        
        <h2>EN VIVO</h2>
        
        <audio controls autoplay>
            <source src="https://uni-solo-bacon-commodities.trycloudflare.com/live" type="audio/mpeg">
            Tu navegador no soporta el reproductor de audio.
        </audio>
    </div>

</body>
</html>
</html>
