<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEX Radio</title>
    
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    
    <style>
        /* Estilos para el fondo y el centrado total */
        body { 
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #121212; 
            color: white;
            font-family: Arial, sans-serif;
        }
        .container { 
            text-align: center;
            width: 90%;
            max-width: 500px;
        }
        .logo { 
            width: 250px; 
            height: auto; 
            margin-bottom: 20px;
        }
        audio {
            width: 100%;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="NEX Radio" class="logo">

        <h2 style="margin: 5px 0;">EN VIVO</h2>
        <h3 style="margin: 5px 0; font-weight: normal;">NEX Radio</h3>
        <p style="margin: 5px 0; font-size: 14px; font-style: italic;">La emisora que SINTONIZA tus SENTIDOS</p>

        <audio controls autoplay>
            <source src="https://uni-solo-bacon-commodities.trycloudflare.com/live" type="audio/mpeg">
        </audio>

        <div style="margin-top: 15px; font-size: 24px;">🇻🇪</div>
    </div>

</body>
</html>
